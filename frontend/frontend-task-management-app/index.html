<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lista de Tarefas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Minha Lista de Tarefas</h1>
  </header>

  <main>
    <div class="input-container">
      <input 
        type="text" 
        id="taskInput" 
        placeholder="Digite uma nova tarefa..."
      >
      <button id="addTaskBtn">Adicionar</button>
    </div>
    <ul id="taskList"></ul>
  </main>

  <section id="future-improvements">
    <h2>Possíveis melhorias futuras</h2>
    <ul>
      <li>Filtros para mostrar todas/pendentes/concluídas</li>
      <li>Edição de tarefas</li>
      <li>Datas e prioridades</li>
    </ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
